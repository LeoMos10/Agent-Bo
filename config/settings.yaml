agent:
  name: LeoAgent
  mode: semi_autonomous
  idle_reflection_minutes: 20
  healthcheck_minutes: 5
  loop_sleep_seconds: 10

permissions:
  auto_read_web: true
  auto_generate_reports: true
  auto_download_files: true
  auto_run_safe_terminal: true

  require_confirmation_install: true
  require_confirmation_system_files: true
  require_confirmation_delete: true
  require_confirmation_print: true
  require_confirmation_submit: true

paths:
  reports_dir: reports
  logs_dir: logs
  memory_dir: memory

notifications:
  enabled: false
  provider: telegram
  token: ""
  chat_id: ""

ollama:
  model: qwen2.5:7b
  base_url: http://localhost:11434
  unload_after_idle_seconds: 300